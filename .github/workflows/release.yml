name: release

# Publish to PyPI on a GitHub Release. The runner has Python + Node, so `python -m build` runs the
# hatch hook (esbuild → murder/_inktui/index.js) and the wheel ships the self-contained Ink bundle.
# Publishing uses PyPI Trusted Publishing (OIDC) — no API token stored in GitHub.
on:
  release:
    types: [published]

permissions:
  id-token: write          # required for Trusted Publishing (OIDC)

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi        # bind the Trusted Publisher to this environment
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: python -m pip install build
      - run: python -m build            # hatch hook runs esbuild here → bundle in the wheel
      - uses: pypa/gh-action-pypi-publish@release/v1   # no token: OIDC
