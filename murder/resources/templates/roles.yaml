# Bundled defaults. Copied (minus selection fields) to .murder/roles.yaml on `murder init`.
# Harness/model selection (harness, harnesses, startup_model, startup_effort,
# startup_models, startup_models_by_harness) is user-scope only: set it via the
# in-app settings menu (~/.config/murder/config.yaml). The selection values in
# this file are bundled fallback defaults; project .murder/roles.yaml ignores them.

project:
  name: TODO_SET_ME           # used in tmux session names
  repo_path: .

collaborator:
  kind: harness
  harness: claude_code        # picked from Settings (ctrl+p); also drives the collaborator planning mode
  startup_prompt_template: collaborator.md
  # Opus 4.7 is selected inside CC; not configured here.

notetaker:
  kind: api
  provider: groq
  model: openai/gpt-oss-120b
  auto_free: true
  max_tokens: 1500

planner:
  kind: harness
  harness: claude_code
  startup_prompt_template: planner.md
  crow_ask_template: crow_ask_to_planner.md
  poll_interval_s: 5
  # Opus 4.7 is picked inside CC; not configured here.

crow_handler:
  kind: api
  provider: groq
  model: openai/gpt-oss-120b
  auto_free: true
  poll_interval_s: 45
  forced_summary_every_n_ticks: 7
  stuck_threshold_ticks: 3
  context_lines: 40

default_crow:
  kind: harness
  # Harness/model selection lives in user config (in-app settings menu /
  # ~/.config/murder/config.yaml); harness pools and startup models there pick
  # stably by ticket id. The values below are bundled defaults only.
  harness: cursor
  startup_model: composer       # cursor's selector; consumed by CursorAdapter
  startup_prompt_template: fresh_crow.md

tui:
  ticket_grid_max_rows: 20
  pane_mirror_height: 30
  escalation_strip_height: 8
  refresh_ms: 1000              # D11

runtime:
  run_dir: .murder/runs
  session_name_template: "murder_{project}_{role}{suffix}"
